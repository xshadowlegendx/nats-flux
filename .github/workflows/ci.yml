
on:
  release:
    types:
      - published
  push:
    branches:
      - dev
      - main
    paths-ignore:
      - tiltfile
      - readme.md
      - sample.http

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.93.0
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  tests:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2-alpine
        ports:
          - 5222:4222
    container:
      image: xd009642/tarpaulin:0.35.2-slim
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@v6

      - name: Run tarpaulin
        run: cargo tarpaulin --all-features --out xml
        env:
          NATS_URL: nats://localhost:5222

      - name: Upload to codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: cobertura.xml

  sast:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - run: semgrep ci
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  build-image:
    runs-on: ubuntu-latest
    needs:
      - lint
      - tests
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.ref_name == 'dev' || github.ref_name == 'main' || (github.event_name == 'release' && github.event.action == 'published')

      - name: Build docker image
        uses: docker/build-push-action@v7
        id: docker_build
        with:
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref_name == 'dev' || github.ref_name == 'main' || (github.event_name == 'release' && github.event.action == 'published') }}
          context: .
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name == 'dev' && 'dev' || github.ref_name == 'main' && 'latest' || github.ref_name }}

  update-release:
    runs-on: ubuntu-latest
    if: github.event.action == 'published'
    steps:
      - uses: actions/checkout@v6

      - name: Install cog
        run: |
          curl -sLo cog.tar.gz https://github.com/cocogitto/cocogitto/releases/download/7.0.0/cocogitto-7.0.0-x86_64-unknown-linux-musl.tar.gz
          tar -xzf cog.tar.gz
          mv x86_64-unknown-linux-musl/cog /usr/local/bin/

      - name: construct release body
        run: |
          cat <<EOF> release.md
          $(cog changelog ${{ github.ref_name }})
          EOF

      - uses: markpatterson27/markdown-to-output@v1
        id: release_body
        with:
          filepath: release.md

      - name: Update release
        uses: tubone24/update_release@v1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: ${{ steps.release_body.outputs.body }}
